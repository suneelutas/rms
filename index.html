<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research and Consultancy Department, UTAS-Shinas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: brightness(0.7);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.7); /* Transparent white */
            padding: 40px;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            color: navy;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .columns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-link {
            background-color: #ffffff22;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        .form-link a {
            text-decoration: none;
            color: navy;
            font-size: 18px;
            display: block;
        }

        .form-link:hover {
            background-color: #ffffff55;
        }

        @media screen and (max-width: 600px) {
            .columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Research and Consultancy Department, UTAS-Shinas</h1>
        <div class="columns">
            <div class="form-link"><a href="https://forms.office.com/r/yUEfcEH4Sp" target="_blank">Research Data Management</a></div>
            <div class="form-link"><a href="https://forms.office.com/r/220WWWHBVT" target="_blank">Research Support Service Request</a></div>
            <div class="form-link"><a href="https://forms.office.com/r/V9J7aNiSH1" target="_blank">Research Proposal Submission</a></div>
            <div class="form-link"><a href="https://forms.office.com/r/jVXcAmKCmy" target="_blank">Project Progress Report</a></div>
	    <div class="form-link"><a href="https://forms.office.com/r/YSknfVPkBk" target="_blank">Research Activity</a></div>
        </div>
    </div>

</body>
</html>
